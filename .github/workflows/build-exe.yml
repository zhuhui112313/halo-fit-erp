name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --console --name="HALO-FIT-外贸进销存系统" app.py

    - name: Create Release Package
      run: |
        mkdir release
        copy HALO-FIT-外贸进销存系统.exe release\
        copy 使用说明.md release\
        copy halo_fit.db release\
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: halo-fit-erp-windows
        path: release/
        retention-days: 7
